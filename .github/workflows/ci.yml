name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: "3.12" }
      - name: Install
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest -q tests/
      - name: Doctrine — forbid BSL alibi-detect dependency (license hygiene)
        run: |
          # Fail ONLY on a real dependency/import of alibi-detect, NOT on the
          # honesty docs that correctly state it is EXCLUDED. Exclusion/disclaimer
          # lines (NOT USED / excluded / rejected / BSL / absent) are allowed.
          hits=$(grep -rInE "alibi[-_]detect" --include="*.py" --include="*.txt" . \
            | grep -viE "not used|excluded|exclude|reject|forbidden|absent|must not|BSL|deliberately|disclaimer" \
            | grep -iE "import .*alibi|from .*alibi|^[^#]*alibi[-_]detect *([=<>~!]=|$)" || true)
          if [ -n "$hits" ]; then
            echo "$hits"; echo "::error::alibi-detect is BSL-1.1 — forbidden as a dependency/import. Use permissive lineage only."; exit 1
          fi
          echo "OK: no BSL alibi-detect dependency/import (exclusion docs are allowed)"
      - name: Doctrine — no fabricated signatures
        run: |
          if grep -rIE "signature\s*[:=]\s*['\"][A-Za-z0-9+/]{20,}" --include="*.py" . ; then
            echo "::error::possible fabricated signature literal"; exit 1
          fi
          echo "OK: no fabricated signature literals"
